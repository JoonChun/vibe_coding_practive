<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="64" height="64">
  <!-- 사모 (문관 관모 기단) -->
  <rect x="10" y="3" width="12" height="2" fill="#1A1410"/>
  <!-- 사모 좌 각 (위로 솟은 가는 뿔) -->
  <rect x="9"  y="2" width="1"  height="4" fill="#1A1410"/>
  <!-- 사모 우 각 -->
  <rect x="22" y="2" width="1"  height="4" fill="#1A1410"/>
  <!-- 사모 중앙 몸체 -->
  <rect x="10" y="5" width="12" height="3" fill="#1A1410"/>
  <!-- 사모 하단 테두리 -->
  <rect x="9"  y="8" width="14" height="1" fill="#1A1410"/>

  <!-- 얼굴 -->
  <rect x="10" y="9"  width="12" height="8" fill="#F0CFA0"/>
  <!-- 얼굴 좌 음영 -->
  <rect x="10" y="9"  width="1"  height="8" fill="#C9A37A"/>
  <!-- 얼굴 우 음영 -->
  <rect x="21" y="9"  width="1"  height="8" fill="#C9A37A"/>
  <!-- 눈 (좌) -->
  <rect x="12" y="12" width="2"  height="2" fill="#1A1410"/>
  <!-- 눈 (우) -->
  <rect x="18" y="12" width="2"  height="2" fill="#1A1410"/>
  <!-- 입 -->
  <rect x="14" y="15" width="4"  height="1" fill="#1A1410"/>

  <!-- 목 -->
  <rect x="13" y="17" width="6"  height="2" fill="#F0CFA0"/>
  <!-- 흰 깃 (문관 깃 강조) -->
  <rect x="11" y="18" width="2"  height="1" fill="#F4ECD8"/>
  <rect x="19" y="18" width="2"  height="1" fill="#F4ECD8"/>

  <!-- 관복 몸통 (청람) -->
  <rect x="9"  y="19" width="14" height="10" fill="#2C5F8D"/>
  <!-- 좌 어깨 음영 -->
  <rect x="9"  y="19" width="2"  height="10" fill="#1B3D5C"/>
  <!-- 우 어깨 음영 -->
  <rect x="21" y="19" width="2"  height="10" fill="#1B3D5C"/>
  <!-- 중앙 여밈선 -->
  <rect x="15" y="19" width="2"  height="10" fill="#1B3D5C"/>
  <!-- 소매 (좌) -->
  <rect x="5"  y="20" width="4"  height="6"  fill="#2C5F8D"/>
  <!-- 소매 끝단 (좌) -->
  <rect x="5"  y="25" width="4"  height="1"  fill="#1B3D5C"/>
  <!-- 소매 (우) -->
  <rect x="23" y="20" width="4"  height="6"  fill="#2C5F8D"/>
  <!-- 소매 끝단 (우) -->
  <rect x="23" y="25" width="4"  height="1"  fill="#1B3D5C"/>

  <!-- 흉배 (학 추상 — 테두리 청람 어두운) -->
  <rect x="13" y="21" width="6"  height="4"  fill="#1B3D5C"/>
  <!-- 흉배 내부 흰 점 (학 추상) -->
  <rect x="15" y="22" width="2"  height="2"  fill="#F4ECD8"/>

  <!-- 발 / 신발 -->
  <rect x="10" y="29" width="4"  height="3"  fill="#1A1410"/>
  <rect x="18" y="29" width="4"  height="3"  fill="#1A1410"/>
</svg>
