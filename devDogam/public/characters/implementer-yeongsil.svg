<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="64" height="64">
  <!-- 두건 (단순 둥근 사각형 — 갓보다 낮고 실용적) -->
  <rect x="10" y="4" width="12" height="5" fill="#1A1410"/>
  <!-- 두건 하단 테두리 -->
  <rect x="9"  y="8" width="14" height="1" fill="#1A1410"/>

  <!-- 얼굴 -->
  <rect x="10" y="9"  width="12" height="8" fill="#F0CFA0"/>
  <!-- 얼굴 좌 음영 -->
  <rect x="10" y="9"  width="1"  height="8" fill="#C9A37A"/>
  <!-- 얼굴 우 음영 -->
  <rect x="21" y="9"  width="1"  height="8" fill="#C9A37A"/>
  <!-- 눈 (좌) -->
  <rect x="12" y="12" width="2"  height="2" fill="#1A1410"/>
  <!-- 눈 (우) -->
  <rect x="18" y="12" width="2"  height="2" fill="#1A1410"/>
  <!-- 입 (굳은 표정) -->
  <rect x="14" y="15" width="4"  height="1" fill="#1A1410"/>

  <!-- 목 -->
  <rect x="13" y="17" width="6"  height="2" fill="#F0CFA0"/>
  <!-- 깃 -->
  <rect x="11" y="18" width="2"  height="1" fill="#6B3A0E"/>
  <rect x="19" y="18" width="2"  height="1" fill="#6B3A0E"/>

  <!-- 작업복 몸통 (적동) -->
  <rect x="9"  y="19" width="14" height="10" fill="#B8651E"/>
  <!-- 좌 어깨 음영 -->
  <rect x="9"  y="19" width="2"  height="10" fill="#6B3A0E"/>
  <!-- 우 어깨 음영 -->
  <rect x="21" y="19" width="2"  height="10" fill="#6B3A0E"/>
  <!-- 중앙 여밈선 -->
  <rect x="15" y="19" width="2"  height="10" fill="#6B3A0E"/>
  <!-- 소매 (좌) -->
  <rect x="5"  y="20" width="4"  height="6"  fill="#B8651E"/>
  <!-- 소매 끝단 (좌) -->
  <rect x="5"  y="25" width="4"  height="1"  fill="#6B3A0E"/>
  <!-- 소매 (우) -->
  <rect x="23" y="20" width="4"  height="6"  fill="#B8651E"/>
  <!-- 소매 끝단 (우) -->
  <rect x="23" y="25" width="4"  height="1"  fill="#6B3A0E"/>

  <!-- 도구 (망치 추상 — 좌 소매 끝에 회색 픽셀) -->
  <rect x="5"  y="22" width="2"  height="1"  fill="#6B7280"/>
  <rect x="6"  y="23" width="1"  height="2"  fill="#6B7280"/>

  <!-- 발 / 신발 -->
  <rect x="10" y="29" width="4"  height="3"  fill="#1A1410"/>
  <rect x="18" y="29" width="4"  height="3"  fill="#1A1410"/>
</svg>
