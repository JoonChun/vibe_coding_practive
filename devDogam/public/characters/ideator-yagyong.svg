<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="64" height="64">
  <!-- 정자관 (학자 모자 — 낮고 단정한 사각형) -->
  <rect x="10" y="5" width="12" height="4" fill="#1A1410"/>
  <!-- 정자관 하단 테두리 -->
  <rect x="9"  y="8" width="14" height="1" fill="#1A1410"/>

  <!-- 얼굴 -->
  <rect x="10" y="9"  width="12" height="8" fill="#F0CFA0"/>
  <!-- 얼굴 좌 음영 -->
  <rect x="10" y="9"  width="1"  height="8" fill="#C9A37A"/>
  <!-- 얼굴 우 음영 -->
  <rect x="21" y="9"  width="1"  height="8" fill="#C9A37A"/>
  <!-- 눈 (좌) -->
  <rect x="12" y="12" width="2"  height="2" fill="#1A1410"/>
  <!-- 눈 (우) -->
  <rect x="18" y="12" width="2"  height="2" fill="#1A1410"/>
  <!-- 입 -->
  <rect x="14" y="15" width="4"  height="1" fill="#1A1410"/>

  <!-- 목 -->
  <rect x="13" y="17" width="6"  height="2" fill="#F0CFA0"/>
  <!-- 깃 -->
  <rect x="11" y="18" width="2"  height="1" fill="#4D6B3A"/>
  <rect x="19" y="18" width="2"  height="1" fill="#4D6B3A"/>

  <!-- 관복 몸통 (녹두) -->
  <rect x="9"  y="19" width="14" height="10" fill="#7BA05B"/>
  <!-- 좌 어깨 음영 -->
  <rect x="9"  y="19" width="2"  height="10" fill="#4D6B3A"/>
  <!-- 우 어깨 음영 -->
  <rect x="21" y="19" width="2"  height="10" fill="#4D6B3A"/>
  <!-- 중앙 여밈선 -->
  <rect x="15" y="19" width="2"  height="10" fill="#4D6B3A"/>
  <!-- 소매 (좌) -->
  <rect x="5"  y="20" width="4"  height="6"  fill="#7BA05B"/>
  <!-- 소매 끝단 (좌) -->
  <rect x="5"  y="25" width="4"  height="1"  fill="#4D6B3A"/>
  <!-- 소매 (우) -->
  <rect x="23" y="20" width="4"  height="6"  fill="#7BA05B"/>
  <!-- 소매 끝단 (우) -->
  <rect x="23" y="25" width="4"  height="1"  fill="#4D6B3A"/>

  <!-- 책/두루마리 (우 소매 위) -->
  <rect x="24" y="21" width="3"  height="3"  fill="#F4ECD8"/>
  <rect x="25" y="22" width="1"  height="1"  fill="#1A1410"/>

  <!-- 흉배 (단순 — 실학자 차분) -->
  <rect x="13" y="21" width="6"  height="4"  fill="#4D6B3A"/>
  <!-- 흉배 내부 점 -->
  <rect x="15" y="22" width="2"  height="2"  fill="#7BA05B"/>

  <!-- 발 / 신발 -->
  <rect x="10" y="29" width="4"  height="3"  fill="#1A1410"/>
  <rect x="18" y="29" width="4"  height="3"  fill="#1A1410"/>
</svg>
