<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" width="80" height="80">
  <!-- 익선관 (왕관 기단) -->
  <rect x="10" y="2" width="12" height="2" fill="#1A1410"/>
  <!-- 익선관 좌 날개 -->
  <rect x="8"  y="3" width="2"  height="3" fill="#1A1410"/>
  <!-- 익선관 우 날개 -->
  <rect x="22" y="3" width="2"  height="3" fill="#1A1410"/>
  <!-- 익선관 중앙 상단 -->
  <rect x="10" y="4" width="12" height="4" fill="#1A1410"/>
  <!-- 익선관 하단 테두리 -->
  <rect x="9"  y="8" width="14" height="1" fill="#1A1410"/>

  <!-- 얼굴 -->
  <rect x="10" y="9"  width="12" height="8" fill="#F0CFA0"/>
  <!-- 얼굴 좌 음영 -->
  <rect x="10" y="9"  width="1"  height="8" fill="#C9A37A"/>
  <!-- 얼굴 우 음영 -->
  <rect x="21" y="9"  width="1"  height="8" fill="#C9A37A"/>
  <!-- 눈 (좌) -->
  <rect x="12" y="12" width="2"  height="2" fill="#1A1410"/>
  <!-- 눈 (우) -->
  <rect x="18" y="12" width="2"  height="2" fill="#1A1410"/>
  <!-- 입 -->
  <rect x="14" y="15" width="4"  height="1" fill="#1A1410"/>

  <!-- 목 -->
  <rect x="13" y="17" width="6"  height="2" fill="#F0CFA0"/>
  <!-- 둥근 깃 — 목·어깨 경계 좌우 -->
  <rect x="11" y="18" width="2"  height="1" fill="#1A1410"/>
  <rect x="19" y="18" width="2"  height="1" fill="#1A1410"/>

  <!-- 곤룡포 몸통 (적색) -->
  <rect x="8"  y="19" width="16" height="10" fill="#C0392B"/>
  <!-- 곤룡포 좌 어깨 음영 -->
  <rect x="8"  y="19" width="2"  height="10" fill="#8B0000"/>
  <!-- 곤룡포 우 어깨 음영 -->
  <rect x="22" y="19" width="2"  height="10" fill="#8B0000"/>
  <!-- 곤룡포 중앙 세로선 (여밈) -->
  <rect x="15" y="19" width="2"  height="10" fill="#8B0000"/>
  <!-- 소매 (좌) -->
  <rect x="5"  y="20" width="3"  height="6"  fill="#C0392B"/>
  <!-- 소매 끝단 (좌) -->
  <rect x="5"  y="25" width="3"  height="1"  fill="#8B0000"/>
  <!-- 소매 (우) -->
  <rect x="24" y="20" width="3"  height="6"  fill="#C0392B"/>
  <!-- 소매 끝단 (우) -->
  <rect x="24" y="25" width="3"  height="1"  fill="#8B0000"/>

  <!-- 흉배 — 노란 배경 (오조룡) -->
  <rect x="13" y="21" width="6"  height="4"  fill="#C9A227"/>
  <!-- 흉배 용 추상 — 어두운 점 -->
  <rect x="14" y="22" width="1"  height="1"  fill="#1A1410"/>
  <rect x="17" y="22" width="1"  height="1"  fill="#1A1410"/>
  <rect x="15" y="23" width="2"  height="1"  fill="#1A1410"/>

  <!-- 발 / 신발 (좌) -->
  <rect x="10" y="29" width="5"  height="3"  fill="#1A1410"/>
  <!-- 발 / 신발 (우) -->
  <rect x="17" y="29" width="5"  height="3"  fill="#1A1410"/>
</svg>
